<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="index.php" method="post" enctype="multipart/form-data">
        <label for="username">username</label>
        <input type="text" id="username" required minlength="6"  maxlength="15">
        <br>
        <label for="password">password</label>
        <input type="password" id="password" required minlength="6"  maxlength="15">
        <br>
        <label for="email">Emailid:</label>
        <input type="email" id="xyz" placeholder="abc@gmail.com">
        <br>
        <label for="phonenNum">phonenNum:</label>
        <input type="tel" id="phonenNum" pattern="[6-9]{1}[0-9]{9}" minlength="10" maxlength="10">
        <br>
        <label for="dob">DOB</label>
        <input type="date" id="dob"><br>
        <label for="quantity">quantity:</label>
        <input type="number" id="quantity" min="1" max="99" value="1">
        <br>
        <label for="title">Title:</label>
        <label for="Mr.">Mr.</label>
        <input type="radio" id="Mr." value="Mr." name="title">
        <label for="Ms.">Ms.</label>
        <input type="radio" id="Ms." value="Mr." name="title">
        <label for="phd.">phd.</label>
        <input type="radio" id="phd." value="phd." name="title">
        <br>
        <label for="university">university:</label>
        
        <select>
            <option value="Lendi">Lendicollege</option>
            <option value="raghu">Raghucollege</option>
        </select>
        <br>
        <br>
        <label for="comment">Comment:</label>
        <textarea id="comment" rows="3" cols="25"></textarea>
        <br>
        <label for="file">photo</label>
        <input type="file" accept="image/png,image/jpeg">
        <br>
        <input type="reset">
        <br>
         <input type="checkbox" id="accept">

        <label for="accept">Accept the terms&Conditions</label>
        <br><br>
        <input type="submit">
    </form>
</body>
</html>
