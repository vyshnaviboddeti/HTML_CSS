<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>this  is a <b>bold</b> normal text</p>
    <p>this  is a <i>italic</i> normal text</p>
    <p>this  is a  <u>underlined</u> normal text</p>
    <p>this  is a <del>deleted</del> normal text</p>
    <p>this  is a <big>big</big> normal text</p>
    <p>this  is a <small>small</small> text</p>
    <p>this  is a <sub>sub</sub> normal text</p>
    <p>this  is a <sup>super</sup> normal text</p>
    <p>this  is a <tt>text</tt> normal text</p>
    <p>this  is a <mark style="background-color: blueviolet">text</mark> text</p>
</body>
</html>
